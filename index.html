<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CançoNet</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4A017">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CançoNet">
<script>if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));</script>
<style>
:root{--gold:#D4A017;--red:#C1121F;--bg:#0d0d1a;--card:#161e35;--text:#eee;--muted:#778;--ok:#4caf50;--err:#f44336;--purple:#7c3aed}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.scr{display:none;flex-direction:column;align-items:center;padding:16px 14px 70px;min-height:100dvh}
.scr.on{display:flex}
#s-splash{justify-content:center;align-items:center;padding:0;cursor:pointer;position:relative;overflow:hidden}
.splash-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0d0d1a 70%)}
.splash-inner{position:relative;text-align:center;z-index:2}
.splash-logo{font-size:6.5rem;font-weight:900;color:var(--gold);letter-spacing:-4px;opacity:0;transform:scale(.7);animation:sIn 1s cubic-bezier(.34,1.56,.64,1) .4s forwards}
.splash-logo b{color:var(--red)}
.splash-sub{font-size:1.5rem;color:var(--muted);margin-top:14px;opacity:0;animation:sIn .7s ease-out 1.1s forwards}
.splash-tap{font-size:1.1rem;color:rgba(255,255,255,.3);margin-top:40px;opacity:0;animation:sIn .5s ease 2s forwards}
@keyframes sIn{to{opacity:1;transform:scale(1) translateY(0)}}
.float-note{position:absolute;font-size:1.8rem;opacity:0;animation:floatUp 2.5s ease-out forwards}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) rotate(0deg)}20%{opacity:.8}100%{opacity:0;transform:translateY(-200px) rotate(20deg)}}
#s-splash.fadeout{animation:fadeO .5s ease forwards}
@keyframes fadeO{to{opacity:0;pointer-events:none}}
#s-modes{justify-content:center;gap:16px;padding-top:40px}
.modes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:360px;margin-top:10px}
.mode-card{background:var(--card);border:2px solid rgba(255,255,255,.08);border-radius:22px;padding:24px 10px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s;touch-action:manipulation;min-height:140px}
.mode-card:hover,.mode-card:active{border-color:var(--gold);transform:scale(1.04);box-shadow:0 0 28px rgba(212,160,23,.2)}
.mode-card-label{font-size:1rem;font-weight:700;color:var(--text);letter-spacing:.5px;text-transform:uppercase}
.mode-card-sub{font-size:.7rem;color:var(--muted);margin-top:-6px;text-align:center}
.logo{font-size:3.5rem;font-weight:900;color:var(--gold);letter-spacing:-2px;margin:10px 0 2px;text-align:center}
.logo b{color:var(--red)}
.sub{color:var(--muted);font-size:1.05rem;margin-bottom:14px;text-align:center}
.card{background:var(--card);border-radius:16px;padding:18px;width:100%;max-width:460px;margin:7px 0}
.card-ttl{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:10px}
.btn{display:block;width:100%;padding:18px;border:none;border-radius:14px;font-size:1.15rem;font-weight:700;cursor:pointer;margin:5px 0;transition:transform .15s,box-shadow .15s;touch-action:manipulation;min-height:60px}
.btn:hover{transform:translateY(-2px)}.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:#000}.btn-red{background:var(--red);color:#fff}.btn-purple{background:var(--purple);color:#fff}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--text)}.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-outline{background:transparent;border:2px solid var(--muted);color:var(--muted)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:#1a5c1a;color:#fff}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
input[type=text],input[type=email],textarea,select{background:rgba(255,255,255,.07);border:2px solid transparent;border-radius:12px;padding:14px;color:var(--text);font-size:16px;width:100%;outline:none;transition:border .2s;font-family:inherit;-webkit-appearance:none}
input[type=text]:focus,input[type=email]:focus,textarea:focus{border-color:var(--gold)}
select option{background:#161e35}textarea{min-height:90px;resize:vertical}
label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:6px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.zone-btn{background:rgba(255,255,255,.05);border:2px solid transparent;border-radius:12px;padding:14px 6px;color:var(--text);cursor:pointer;font-size:.9rem;font-weight:600;transition:all .2s;text-align:center;touch-action:manipulation;min-height:50px}
.zone-btn:hover,.zone-btn.sel{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.1)}
.zone-btn.wide{grid-column:1/-1}.style-card{background:var(--card);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .18s;touch-action:manipulation;min-height:88px;width:100%;border:none;color:var(--text)}.style-card:hover,.style-card:active{border:1.5px solid var(--gold) !important;transform:scale(1.03)}.style-emoji{font-size:1.9rem;line-height:1}.style-label{font-size:.8rem;font-weight:600;text-align:center;line-height:1.3}
.hud{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:460px;margin:8px 0}
.lvl-badge{background:var(--red);color:#fff;font-size:.75rem;font-weight:700;padding:5px 12px;border-radius:99px;letter-spacing:1px}
.lives{display:flex;gap:4px}.heart{font-size:1.3rem;transition:all .3s}.heart.dead{opacity:.2;filter:grayscale(1)}
.score-disp{font-size:2.2rem;font-weight:900;color:var(--gold)}
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;width:100%;max-width:460px;margin:5px 0}
.dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.12);color:var(--muted);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.dot.ok{background:var(--ok);border-color:var(--ok);color:#fff}.dot.cur{background:var(--gold);border-color:var(--gold);color:#000}
.dot.fail{background:var(--err);border-color:var(--err);color:#fff}.dot.bonus{border-color:var(--purple);box-shadow:0 0 6px rgba(124,58,237,.4)}
.t-wrap{width:100%;max-width:460px;margin:7px 0}.t-track{background:rgba(255,255,255,.1);border-radius:99px;height:8px;overflow:hidden}
.t-fill{height:100%;background:var(--gold);border-radius:99px;transition:width 1s linear,background .4s}.t-fill.hot{background:var(--err)}
.t-num{text-align:right;font-size:.8rem;color:var(--muted);margin-top:3px}
.lv-info{background:rgba(255,255,255,.04);border-radius:12px;padding:10px 14px;text-align:center;width:100%;max-width:460px;margin:4px 0}
.lv-name{font-weight:700;color:var(--gold);font-size:1.1rem}.lv-desc{font-size:.92rem;color:var(--muted);margin-top:2px}
.player-box{background:rgba(255,255,255,.04);border:2px solid rgba(212,160,23,.2);border-radius:16px;padding:18px;width:100%;max-width:460px;text-align:center;margin:7px 0}
.play-btn{width:68px;height:68px;border-radius:50%;background:var(--gold);border:none;font-size:1.7rem;cursor:pointer;transition:all .2s;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;color:#000;touch-action:manipulation}
.play-btn:hover{transform:scale(1.08);box-shadow:0 0 26px rgba(212,160,23,.5)}
.play-btn.on{background:var(--red);color:#fff;animation:pulse 1s infinite}
.play-btn:disabled{opacity:.4;cursor:not-allowed;animation:none;transform:none}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:36px;margin:6px 0}
.wb{width:4px;background:var(--gold);border-radius:2px}.wb.a{animation:wv .5s ease-in-out infinite}
@keyframes wv{0%,100%{height:4px}50%{height:28px}}
.p-info{font-size:.78rem;color:var(--muted)}
.hint-box{background:rgba(212,160,23,.1);border:1px solid rgba(212,160,23,.25);border-radius:10px;padding:10px 14px;font-size:.88rem;color:var(--gold);text-align:center;width:100%;max-width:460px;margin:5px 0}
.ans-mode-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:8px}
.choice-grid{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 18px;color:var(--text);font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .2s;touch-action:manipulation;text-align:left}
.choice-btn:hover{background:rgba(255,255,255,.13);border-color:var(--gold)}
.choice-btn.correct{background:rgba(76,175,80,.2);border-color:var(--ok);color:var(--ok)}
.choice-btn.wrong{background:rgba(244,67,54,.15);border-color:var(--err);color:var(--err)}
.bonus-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(212,160,23,.3),rgba(124,58,237,.3));border:1px solid rgba(212,160,23,.4);border-radius:99px;padding:5px 14px;font-size:.75rem;font-weight:700;color:var(--gold);animation:bonusPulse 1.5s infinite}
@keyframes bonusPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.3)}50%{box-shadow:0 0 12px 4px rgba(212,160,23,.2)}}
.sugg-item{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:.88rem}
.sugg-item:hover{background:rgba(212,160,23,.1)}.sugg-art{color:var(--muted);font-size:.78rem}
.mode-badge{display:inline-block;padding:4px 12px;border-radius:99px;font-size:.7rem;font-weight:700;margin-bottom:8px}
.mode-badge.autor{background:rgba(124,58,237,.3);color:#a78bfa}.mode-badge.daily{background:rgba(212,160,23,.2);color:var(--gold)}
.mode-badge.free{background:rgba(193,18,31,.2);color:#f87171}.mode-badge.challenge{background:rgba(124,58,237,.2);color:#a78bfa}
.lang-badge{display:inline-block;background:rgba(255,255,255,.08);border-radius:99px;padding:3px 10px;font-size:.7rem;color:var(--muted);margin-left:6px}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.05);border-radius:12px;padding:4px;width:100%;max-width:460px;margin:9px 0}
.tab{flex:1;padding:10px 4px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-weight:600;font-size:.73rem;cursor:pointer;transition:all .2s;touch-action:manipulation}
.tab.on{background:var(--card);color:var(--gold)}
.ztabs{display:flex;gap:4px;overflow-x:auto;width:100%;max-width:460px;padding-bottom:4px;scrollbar-width:none}.ztabs::-webkit-scrollbar{display:none}
.ztab{flex-shrink:0;padding:8px 14px;border:none;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;touch-action:manipulation}
.ztab.on{background:var(--gold);color:#000}
.rrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rrow.highlight{background:rgba(212,160,23,.07);border-radius:8px;margin:0 -8px;padding-left:8px;padding-right:8px}
.rpos{width:28px;text-align:center;font-weight:900;color:var(--muted)}.rname{flex:1;font-weight:600;font-size:.9rem}
.rzone{font-size:.74rem;color:var(--muted)}.rscore{font-weight:900;color:var(--gold)}
.pos-up{color:#4caf50;font-size:.75rem;font-weight:700;margin-left:4px}.pos-down{color:#f44336;font-size:.75rem;font-weight:700;margin-left:4px}
.pos-new{color:#D4A017;font-size:.7rem;font-weight:700;margin-left:4px;background:rgba(212,160,23,.15);padding:1px 5px;border-radius:4px}
.go-emoji{font-size:3.2rem;margin:10px 0}.go-title{font-size:1.5rem;font-weight:900;text-align:center}
.go-sub{color:var(--muted);font-size:.88rem;margin:5px 0 14px;text-align:center}
.final-pts{font-size:3.2rem;font-weight:900;color:var(--gold);text-align:center;line-height:1}
.res-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.83rem}
.share-card{background:linear-gradient(135deg,#161e35,#0d0d1a);border:1px solid rgba(212,160,23,.3);border-radius:14px;padding:14px;text-align:center;margin:10px 0;width:100%;max-width:460px}
.share-title{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.share-dots{font-size:1.2rem;letter-spacing:3px;margin:6px 0}.share-score{font-size:1.6rem;font-weight:900;color:var(--gold)}
.share-zone{font-size:.75rem;color:var(--muted);margin-top:4px}
.daily-played-box{background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.3);border-radius:12px;padding:12px 14px;width:100%;max-width:460px;margin:5px 0;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.hide{display:none}
.modal-box{background:var(--card);border-radius:20px;padding:28px 22px;width:100%;max-width:340px;text-align:center;border:1px solid rgba(212,160,23,.3)}
.modal-emoji{font-size:3rem;margin-bottom:10px}.modal-title{font-size:1.2rem;font-weight:900;margin-bottom:8px;color:var(--gold)}
.modal-sub{font-size:.85rem;color:var(--muted);line-height:1.7;margin-bottom:18px}
.modal-features{text-align:left;background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;margin-bottom:18px;font-size:.82rem;color:var(--text);line-height:2}
.radio-grp{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.radio-pill{background:rgba(255,255,255,.05);border:2px solid transparent;border-radius:20px;padding:8px 14px;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;color:var(--muted);touch-action:manipulation}
.radio-pill.sel{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.1)}
.social-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.social-btn{background:rgba(255,255,255,.07);border:none;border-radius:10px;padding:10px 14px;color:var(--text);font-size:.82rem;cursor:pointer;text-decoration:none;display:inline-block;touch-action:manipulation}
.social-btn:hover{background:rgba(255,255,255,.14)}
#dz-audio{position:fixed;bottom:-9999px;left:-9999px}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border-radius:14px;padding:12px 20px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;border:1px solid rgba(255,255,255,.12);font-size:.9rem;max-width:88vw;text-align:center}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}
.w-full{width:100%;max-width:460px}.center{text-align:center}.muted{color:var(--muted)}.field{margin-bottom:14px}.big{font-size:1.6rem;font-weight:700}.mt{margin-top:8px}.sep{height:1px;background:rgba(255,255,255,.07);margin:10px 0}
</style>
</head>
<body>
<div id="toast"></div>
<audio id="dz-audio" preload="auto"></audio>

<div class="modal-overlay hide" id="modal-wip">
  <div class="modal-box">
    <div class="modal-emoji">🚧</div>
    <div class="modal-title" id="wip-title">En construcció</div>
    <div class="modal-sub" id="wip-sub"></div>
    <div class="modal-features" id="wip-features"></div>
    <button class="btn btn-gold" onclick="closeWip()">🎵 Tornar al joc</button>
    <button class="btn btn-ghost" onclick="go('s-bustia');closeWip()" style="font-size:.8rem;padding:10px;margin-top:4px">💌 Suggerir millores</button>
  </div>
</div>

<div id="s-login" class="scr">
  <div class="logo">Cançó<b>Net</b></div>
  <div class="sub" id="login-sub">🎵 Endevina la cançó catalana</div>
  <div class="card" id="login-card-email">
    <div style="text-align:center;margin-bottom:18px"><div style="font-size:2.5rem;margin-bottom:8px">🎵</div><div style="font-weight:700;font-size:1.1rem;margin-bottom:6px" id="login-title">Entra a CançoNet</div><div style="font-size:.82rem;color:var(--muted);line-height:1.7" id="login-desc">Posa el teu correu i et enviarem un codi de 8 dígits.</div></div>
    <div class="field"><label id="login-lbl-email">Correu electrònic</label><input id="login-email" type="email" placeholder="correu@exemple.com" autocomplete="email"></div>
    <button class="btn btn-gold" id="login-btn" onclick="onSendOtp()">Enviar codi 🎵</button>
    <div style="text-align:center;margin-top:10px"><span style="font-size:.75rem;color:var(--muted)" id="login-privacy">En entrar acceptes les condicions d'ús</span></div>
  </div>
  <div class="card" id="login-card-sent" style="display:none;text-align:center">
    <div style="font-size:2.5rem;margin-bottom:12px">📧</div>
    <div style="font-weight:700;font-size:1.1rem;margin-bottom:8px" id="login-sent-title">Email enviat!</div>
    <div style="font-size:.85rem;color:var(--muted);line-height:1.8" id="login-sent-desc"></div>
    <div style="margin-top:18px;display:flex;justify-content:center"><input id="login-otp-input" type="tel" maxlength="8" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" placeholder="00000000" style="width:210px;text-align:center;font-size:1.6rem;font-weight:900;letter-spacing:8px;background:rgba(255,255,255,.06);border:2px solid var(--gold);border-radius:12px;padding:14px 8px;color:var(--gold);outline:none" oninput="if(this.value.length===8)onVerifyOtp()"></div>
    <button class="btn btn-gold" id="login-verify-btn" onclick="onVerifyOtp()" style="margin-top:14px">✅ Verificar codi</button>
    <div style="margin-top:16px;padding:12px;background:rgba(212,160,23,.1);border-radius:10px;font-size:.78rem;color:var(--gold)" id="login-sent-hint">Revisa la carpeta de spam</div>
    <button class="btn btn-ghost mt" onclick="onResentEmail()" id="login-resend-btn" style="margin-top:14px">Reenviar</button>
    <button class="btn btn-ghost" onclick="resetLoginForm()" style="font-size:.78rem;padding:10px" id="login-back-btn">← Canviar correu</button>
  </div>
</div>

<div id="s-splash" class="scr on" onclick="skipSplash()">
  <div class="splash-bg"></div>
  <div class="splash-inner"><div class="splash-logo">Cançó<b>Net</b></div><div class="splash-sub">🎵 Endevina la cançó</div><div class="splash-tap">Toca per continuar</div></div>
</div>

<div id="s-modes" class="scr">
  <div class="logo">Cançó<b>Net</b></div><div class="sub">Tria el teu mode de joc</div>
  <div class="modes-grid">
    <button class="mode-card" onclick="selectLang('ca')"><div style="font-size:2.5rem">🎵</div><span class="mode-card-label">català</span><span class="mode-card-sub">Cançons catalanes</span></button>
    <button class="mode-card" onclick="selectLang('es')"><div style="font-size:2.5rem">🎸</div><span class="mode-card-label">español</span><span class="mode-card-sub">Canciones españolas</span></button>
    <button class="mode-card" onclick="selectLang('eu')"><div style="font-size:2.5rem">🌍</div><span class="mode-card-label">europe</span><span class="mode-card-sub">European songs</span></button>
    <button class="mode-card" onclick="selectLang('int')"><div style="font-size:2.5rem">🌐</div><span class="mode-card-label">international</span><span class="mode-card-sub">World hits</span></button>
  </div>
</div>

<div id="s-welcome" class="scr">
  <div class="logo">Cançó<b>Net</b></div><div class="sub" id="w-sub"></div>
  <div class="card">
    <div class="field"><label id="w-lbl-name"></label><input id="inp-nick" type="text" maxlength="20"></div>
    <div class="field"><label id="w-lbl-zone"></label><div class="zone-grid" id="zone-grid"></div></div>
    <div class="field"><label>Gènere</label><div class="zone-grid" style="grid-template-columns:1fr 1fr 1fr"><button class="zone-btn" data-g="home" onclick="pickGender(this)">👨 Home</button><button class="zone-btn" data-g=
